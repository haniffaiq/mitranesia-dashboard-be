services:
  backend:
    container_name: mitra-revamp-dashboard-be
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
