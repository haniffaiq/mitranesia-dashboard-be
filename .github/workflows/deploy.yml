name: Deploy dashboard BE

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          if [ -d tests ] && find tests -name 'test_*.py' -o -name '*_test.py' | grep -q .; then
            pytest -q || true
          else
            echo "no tests, skipping"
          fi

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Rsync source to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='*.egg-info' \
            --exclude='.pytest_cache' \
            --exclude='*.db' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./ "$VPS_USER@$VPS_HOST:/srv/api/"

      - name: Build podman image + restart container
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "set -e; cd /srv/api && podman build -t mitranesia-api:latest . && systemctl restart container-mitranesia-api && sleep 5 && systemctl is-active container-mitranesia-api"

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5 6; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' https://api.mitranesia.id/health || true)
            if [ "$code" = "200" ]; then echo "OK code=$code"; exit 0; fi
            echo "attempt $i code=$code, retrying..."
            sleep 5
          done
          echo "smoke test failed"; exit 1
