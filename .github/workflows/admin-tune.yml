name: VPS admin tune

on:
  workflow_dispatch:
  push:
    paths:
      - ".triggers/fail2ban-tune"

jobs:
  tune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Push script + run
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            .github/scripts/tune-fail2ban.sh \
            "$VPS_USER@$VPS_HOST:/tmp/tune-fail2ban.sh"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "chmod +x /tmp/tune-fail2ban.sh && /tmp/tune-fail2ban.sh 112.215.171.70"
