name: BE tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "alembic/**"
      - "pyproject.toml"
      - ".github/workflows/test.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mitranesia_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run alembic migrations
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/mitranesia_test
          PSQL_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mitranesia_test
          JWT_SECRET_KEY: test-secret
          DEFAULT_SUPERADMIN_USERNAME: superadmin
          DEFAULT_SUPERADMIN_PASSWORD: testpassword
        run: alembic upgrade head

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/mitranesia_test
          PSQL_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mitranesia_test
          JWT_SECRET_KEY: test-secret
          DEFAULT_SUPERADMIN_USERNAME: superadmin
          DEFAULT_SUPERADMIN_PASSWORD: testpassword
        run: |
          if find tests -name 'test_*.py' -o -name '*_test.py' 2>/dev/null | grep -q .; then
            pytest -q --tb=short
          else
            echo "no tests yet (skip)"
          fi
